name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: The environment to deploy to.

jobs:
  detect-environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.environments.outputs.result }}
    steps:
      - uses: actions/github-script@v6
        id: environments
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: json
          script: |
            if (context.payload?.inputs?.environment) return [context.payload?.inputs?.environment];
            const {data: {environments}} = 
              await github.request(`GET /repos/${process.env.GITHUB_REPOSITORY}/environments`);
            return environments.map(e => e.name)

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-environments]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.detect-environments.outputs.environments) }}
    environment: ${{ matrix.environment }}
    env:
      DOCKER_REPO: ${{ secrets.DEPLOY_DOCKER_REPOSITORY }}
      ECS_TASK_FAMILY: development-status
      CODEDEPLOY_APPLICATION: development-status
      CODEDEPLOY_DEPLOYMENT_GROUP: development-status-deployment
      CODEDEPLOY_APPSPEC_BUCKET: ${{ secrets.CODEDEPLOY_APPSPEC_BUCKET }}
      CODEDEPLOY_APPSPEC_KEY: ${{ secrets.CODEDEPLOY_APPSPEC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          sha_short=$(git rev-parse --short HEAD)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          safe_ref=$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s/^-+//; s/-+$//')
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${timestamp}-${sha_short}" >> "$GITHUB_OUTPUT"
          echo "safe_ref=${safe_ref}" >> "$GITHUB_OUTPUT"

      - run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          sudo apt-get update
          sudo apt-get install -y rsync jq

      - uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          aws-access-key-id: ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - uses: aws-actions/amazon-ecr-login@v1

      - run: docker build --build-arg DEPLOY_TIME="$(date +%Y-%m-%dT%H:%M:%S)" -t $DOCKER_REPO:${{ steps.vars.outputs.sha_short }} .

      - run: |
          docker tag $DOCKER_REPO:${{ steps.vars.outputs.sha_short }} $DOCKER_REPO:${{ steps.vars.outputs.safe_ref }}
          docker tag $DOCKER_REPO:${{ steps.vars.outputs.sha_short }} $DOCKER_REPO:${{ steps.vars.outputs.release_tag }}

      - run: |
          docker push $DOCKER_REPO:${{ steps.vars.outputs.safe_ref }}
          docker push $DOCKER_REPO:${{ steps.vars.outputs.release_tag }}

      - name: Register ECS task definition revision
        id: register_task_definition
        env:
          IMAGE_URI: ${{ env.DOCKER_REPO }}:${{ steps.vars.outputs.release_tag }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" --include TAGS > taskdef-full.json
          jq --arg IMAGE "$IMAGE_URI" '
            (.taskDefinition
              | .containerDefinitions |= map(.image = $IMAGE)
              | del(.revision, .taskDefinitionArn, .requiresAttributes, .compatibilities, .status, .registeredAt, .registeredBy)
            ) as $def
            | $def + (if (.tags // [] | length) > 0 then {tags: (.tags // [])} else {} end)
          ' taskdef-full.json > register-input.json

          aws ecs register-task-definition --cli-input-json file://register-input.json > register-result.json

          task_definition_arn=$(jq -r '.taskDefinition.taskDefinitionArn' register-result.json)
          echo "task_definition_arn=$task_definition_arn" >> "$GITHUB_OUTPUT"

