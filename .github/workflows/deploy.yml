name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: The environment to deploy to.

jobs:
  detect-environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.environments.outputs.result }}
    steps:
      - uses: actions/github-script@v6
        id: environments
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: json
          script: |
            if (context.payload?.inputs?.environment) return [context.payload?.inputs?.environment];
            const {data: {environments}} = 
              await github.request(`GET /repos/${process.env.GITHUB_REPOSITORY}/environments`);
            return environments.map(e => e.name)

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-environments]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.detect-environments.outputs.environments) }}
    environment: ${{ matrix.environment }}
    env:
      DOCKER_REPO: ${{ secrets.DEPLOY_DOCKER_REPOSITORY }}
      ECS_TASK_FAMILY: ${{ matrix.environment }}-status
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          sha_full=${GITHUB_SHA}
          safe_ref=$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s/^-+//; s/-+$//')
          echo "sha_full=${sha_full}" >> "$GITHUB_OUTPUT"
          echo "safe_ref=${safe_ref}" >> "$GITHUB_OUTPUT"


      - run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          sudo apt-get update
          sudo apt-get install -y rsync jq

      - uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          aws-access-key-id: ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - uses: aws-actions/amazon-ecr-login@v1

      - run: docker build --build-arg DEPLOY_TIME="$(date +%Y-%m-%dT%H:%M:%S)" -t $DOCKER_REPO:${{ steps.vars.outputs.sha_full }} .

      - run: |
          docker tag $DOCKER_REPO:${{ steps.vars.outputs.sha_full }} $DOCKER_REPO:${{ steps.vars.outputs.safe_ref }}

      - run: |
          docker push $DOCKER_REPO:${{ steps.vars.outputs.sha_full }}
          docker push $DOCKER_REPO:${{ steps.vars.outputs.safe_ref }}


      - name: register ecs task definition revision
        id: register_task_definition
        env:
          IMAGE_URI: ${{ env.DOCKER_REPO }}:${{ steps.vars.outputs.sha_full }}

        run: |
          set -euo pipefail
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" --include TAGS > taskdef-full.json
          jq --arg IMAGE "$IMAGE_URI" '
            (.taskDefinition
              | .containerDefinitions |= map(.image = $IMAGE)
              | del(.revision, .taskDefinitionArn, .requiresAttributes, .compatibilities, .status, .registeredAt, .registeredBy)
            ) as $def
            | $def + (if (.tags // [] | length) > 0 then {tags: (.tags // [])} else {} end)
          ' taskdef-full.json > register-input.json

          aws ecs register-task-definition --cli-input-json file://register-input.json > register-result.json

          task_definition_arn=$(jq -r '.taskDefinition.taskDefinitionArn' register-result.json)
          echo "task_definition_arn=$task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: fetch deployment templates from S3
        run: |
          set -euo pipefail
          mkdir -p codedeploy
          aws s3 cp "s3://${{ matrix.environment }}-status-deployments/_buildAssets/taskdef.json" codedeploy/taskdef.json
          aws s3 cp "s3://${{ matrix.environment }}-status-deployments/_buildAssets/appspec.json" codedeploy/appspec.json

      - name: render codedeploy template
        env:
          IMAGE_URI: ${{ env.DOCKER_REPO }}:${{ steps.vars.outputs.sha_full }}
          TASK_DEF_ARN: ${{ steps.register_task_definition.outputs.task_definition_arn }}
        run: |
          set -euo pipefail
          mkdir -p codedeploy/rendered
          jq --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions |= map(.image = $IMAGE)' \
            codedeploy/taskdef.json > codedeploy/rendered/taskdef.json
          jq --arg TASK_DEF "$TASK_DEF_ARN" \
            '.Resources[0].TargetService.Properties.TaskDefinition = $TASK_DEF' \
            codedeploy/appspec.json > codedeploy/rendered/appspec.json

      - name: Trigger CodeDeploy deployment
        id: trigger_codedeploy
        env:
          CODEDEPLOY_APPLICATION: ${{ matrix.environment }}-status
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ matrix.environment }}-status-deployment
        run: |
          set -euo pipefail
          appspec_content=$(jq -c . codedeploy/rendered/appspec.json)
          deployment_json=$(aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APPLICATION" \
            --deployment-group-name "$CODEDEPLOY_DEPLOYMENT_GROUP" \
            --description "sha=${{ steps.vars.outputs.sha_full }}" \
            --revision "$(jq -n --arg as "$appspec_content" '{revisionType:"AppSpecContent",appSpecContent:{content:$as}}')" \
            --output json)

          echo "$deployment_json" > codedeploy/deployment.json
          deployment_id=$(jq -r '.deploymentId' codedeploy/deployment.json)
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

          echo "triggered codedeploy deployment $deployment_id"
          
          set +e
          aws deploy wait deployment-successful --deployment-id "$deployment_id" &
          waiter_pid=$!

          while kill -0 "$waiter_pid" 2>/dev/null; do
            echo "still in progress..."
            sleep 30
          done

          wait "$waiter_pid"
          wait_status=$?
          set -euo pipefail

          deployment_info=$(aws deploy get-deployment \
            --deployment-id "$deployment_id" \
            --output json)
          deployment_status=$(echo "$deployment_info" | jq -r '.deploymentInfo.status')
          echo "deployment_status=$deployment_status" >> "$GITHUB_OUTPUT"

          if [ "$wait_status" -eq 0 ]; then
            echo "Deployment $deployment_id status: $deployment_status"
          else
            failure_details=$(echo "$deployment_info" | jq -c '.deploymentInfo.errorInformation // {}')
            echo "::error::deployment $deployment_id ended with status $deployment_status: $failure_details"
            exit 1
          fi
